name: Build AutoVLESS APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout AutoVLESS
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.7'
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null || true
          set -o pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.2.12479018" \
            "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018"
          go version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build libbox.aar from sing-box
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch v1.13.12 https://github.com/SagerNet/sing-box.git /tmp/sing-box
          cd /tmp/sing-box
          go version
          cat go.mod | head -n 1

          # AutoVLESS needs VLESS, TUN, uTLS and QUIC. It does not need NaiveProxy.
          # The default Android libbox build includes with_naive_outbound, which pulls
          # cronet-go/libcronet.a and can break with: ld.lld unknown relocation (315).
          python3 - <<'PY2'
          from pathlib import Path
          p = Path('cmd/internal/build_libbox/main.go')
          s = p.read_text()
          s = s.replace('"with_naive_outbound", ', '')
          s = s.replace(', "with_naive_outbound"', '')
          p.write_text(s)
          PY2
          ! grep -q "with_naive_outbound" cmd/internal/build_libbox/main.go

          make lib_install
          gomobile init
          go run ./cmd/internal/build_libbox -target android -platform android/arm64

          AAR_PATH="$(find /tmp/sing-box -name 'libbox.aar' -type f | head -n 1)"
          if [ -z "$AAR_PATH" ]; then
            echo "libbox.aar not found"
            find /tmp/sing-box -maxdepth 6 -type f | sort | tail -300
            exit 1
          fi
          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          cp "$AAR_PATH" "$GITHUB_WORKSPACE/app/libs/libbox.aar"
          ls -lh "$GITHUB_WORKSPACE/app/libs/libbox.aar"

      - name: Verify libbox.aar classes
        shell: bash
        run: |
          set -euxo pipefail
          test -s app/libs/libbox.aar
          rm -rf /tmp/libbox-check
          mkdir -p /tmp/libbox-check
          unzip -q app/libs/libbox.aar -d /tmp/libbox-check
          test -s /tmp/libbox-check/classes.jar
          jar tf /tmp/libbox-check/classes.jar | sort | tee /tmp/libbox-classes.txt | sed -n '1,180p'
          grep -E '(^|/)(Libbox|PlatformInterface|BoxService|SetupOptions)\.class$' /tmp/libbox-classes.txt

      - name: Dump libbox public API
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf /tmp/libbox-api
          mkdir -p /tmp/libbox-api
          unzip -q app/libs/libbox.aar -d /tmp/libbox-api

          echo "=== libbox classes ==="
          jar tf /tmp/libbox-api/classes.jar | sort | grep -E 'Libbox|PlatformInterface|BoxService|SetupOptions' || true

          echo "=== javap io.nekohasekai.libbox.Libbox ==="
          javap -classpath /tmp/libbox-api/classes.jar io.nekohasekai.libbox.Libbox || true
          echo "=== javap io.nekohasekai.libbox.BoxService ==="
          javap -classpath /tmp/libbox-api/classes.jar io.nekohasekai.libbox.BoxService || true
          echo "=== javap io.nekohasekai.libbox.SetupOptions ==="
          javap -classpath /tmp/libbox-api/classes.jar io.nekohasekai.libbox.SetupOptions || true
          echo "=== javap io.nekohasekai.libbox.PlatformInterface ==="
          javap -classpath /tmp/libbox-api/classes.jar io.nekohasekai.libbox.PlatformInterface || true

          echo "=== javap libbox.Libbox ==="
          javap -classpath /tmp/libbox-api/classes.jar libbox.Libbox || true
          echo "=== javap libbox.BoxService ==="
          javap -classpath /tmp/libbox-api/classes.jar libbox.BoxService || true
          echo "=== javap libbox.SetupOptions ==="
          javap -classpath /tmp/libbox-api/classes.jar libbox.SetupOptions || true
          echo "=== javap libbox.PlatformInterface ==="
          javap -classpath /tmp/libbox-api/classes.jar libbox.PlatformInterface || true

      - name: Build debug APK
        shell: bash
        run: gradle assembleDebug --stacktrace --info

      - name: Verify APK contains libbox native library
        shell: bash
        run: |
          set -euxo pipefail
          APK="$(find app/build/outputs/apk/debug -name '*.apk' -type f | head -n 1)"
          test -s "$APK"
          unzip -l "$APK" | tee /tmp/apk-files.txt | grep -E 'lib/.*/libgojni\.so|classes[0-9]*\.dex'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoVLESS-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload libbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbox-aar
          path: app/libs/libbox.aar
